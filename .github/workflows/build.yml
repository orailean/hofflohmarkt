name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          tags: hoffroute:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name hoffroute -p 8000:8000 hoffroute:${{ github.sha }}
          for i in $(seq 1 20); do
            curl -fs http://localhost:8000/health && exit 0
            sleep 2
          done
          echo "health check never came up"; docker logs hoffroute; exit 1

